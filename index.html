<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC 3DP Reservations</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 8px; }
        .subtitle { color: #666; margin-bottom: 60px; }

        .selection-container {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
        }

        /* The wrapper for the image + the text below it */
        .printer-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none; /* Removes underline from links */
            color: inherit;
            transition: transform 0.3s ease;
        }

        .printer-option:hover {
            transform: translateY(-10px);
        }

        /* The Circular Image */
        .image-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: #ddd;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 4px solid white;
        }

        /* Typography for titles below images */
        .printer-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .printer-material {
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
        }

        /* Assigning the images */
        .img-super7 { background-image: url('super7 sketch.png'); }
        .img-scara { background-image: url('scara sketch.png'); }

        @media (max-width: 600px) {
            .selection-container { gap: 40px; }
            .image-circle { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ATC 3DP Reservations</h1>
            <p class="subtitle">Select a printer to view available bookings.</p>
        </header>

        <main class="selection-container">
            <a href="booking.html?printer=Super7&material=Clay" class="printer-option">
                <div class="image-circle img-super7"></div>
                <h2 class="printer-title">Super7</h2>
            </a>

            <a href="booking.html?printer=SCARA&material=Wood" class="printer-option">
                <div class="image-circle img-scara"></div>
                <h2 class="printer-title">SCARA</h2>
            </a>
        </main>
    </div>

</body>
</html>
