<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | ATC FabLab</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5; padding: 40px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f5f5; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        #main-content { display: none; }
        .dashboard-container { background: white; max-width: 1250px; margin: 0 auto; border-radius: 25px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .status-panel { display: flex; gap: 20px; margin-bottom: 25px; }
        .printer-card { padding: 15px 25px; border-radius: 15px; border: 2px solid #e5e7eb; display: flex; align-items: center; gap: 15px; flex: 1; background: white; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .offline { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .toggle-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid #000; font-size: 0.75rem; font-weight: 700; cursor: pointer; }
        .controls-flex { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #f9fafb; padding: 15px; border-radius: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { text-align: left; padding: 15px; font-size: 0.75rem; text-transform: uppercase; color: #9ca3af; border-bottom: 2px solid #f3f4f6; }
        td { padding: 15px; font-size: 0.9rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        .notes-input { width: 100%; border: 1px solid transparent; padding: 8px; border-radius: 6px; background: #f9fafb; font-size: 0.85rem; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .tag-super7 { background: #e0f2fe; color: #0369a1; }
        .tag-scara { background: #fef3c7; color: #92400e; }
        .violation-row { background-color: #fff1f2 !important; }
        .flag-text { color: #e11d48; font-weight: 800; }
        .export-btn { cursor:pointer; background: white; border: 1px solid #ddd; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body>
    <div id="login-overlay"><div class="login-box"><h2>Staff Access</h2><input type="password" id="pass-field" placeholder="Password"><br><br><button onclick="checkPass()" style="width:100%; padding:15px; background:black; color:white; border-radius:15px; cursor:pointer; font-weight:700;">Login</button></div></div>

    <div id="main-content">
        <div class="dashboard-container">
            <div class="header-flex">
                <h1>Lab Management</h1>
                <div><span id="status-msg" style="font-size:0.8rem; margin-right:15px; font-weight:600; color:#666;"></span><button onclick="loadData()" style="padding:10px 20px; border-radius:20px; background:black; color:white; border:none; cursor:pointer; font-weight:600;">Refresh</button></div>
            </div>
            
            <div class="status-panel">
                <div class="printer-card"><div id="dot-Super7" class="status-dot"></div><div><b>Super7</b> <button class="toggle-btn" id="btn-Super7" onclick="toggleStatus('Super7')">Loading...</button></div></div>
                <div class="printer-card"><div id="dot-SCARA" class="status-dot"></div><div><b>SCARA</b> <button class="toggle-btn" id="btn-SCARA" onclick="toggleStatus('SCARA')">Loading...</button></div></div>
            </div>


            <div class="controls-flex">
                <span style="font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #9ca3af;">Exports:</span>
                <button class="export-btn" onclick="generateReport('active')">Print Active</button>
                <button class="export-btn" onclick="fetchAndReportCancelled()">Print Canceled</button>
                <button class="export-btn" style="background:#fff1f2; color:#e11d48; border-color:#fecaca;" onclick="generateReport('violations')">Print Violations (3+)</button>
                <div style="margin-left:auto;">Date Filter: <input type="date" id="dash-date" onchange="renderTable()"></div>
            </div>

            <table>
                <thead><tr><th>Date</th><th>Time</th><th>Student Name</th><th>Email</th><th>Printer</th><th>Notes & No-Show Log</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweWbXj7Ga2Ns-DcfAboS7mKFkNCGGS83I8qrnnioaUxWlOwZvqKzZQH_ybK88Mz849OQ/exec"; 
        let allBookings = [];
        let statuses = { super7: "Online", scara: "Online" };

        function checkPass() {
            if (document.getElementById('pass-field').value === "ATC_SPRING_2026") {
                document.getElementById('login-overlay').style.display='none';
                document.getElementById('main-content').style.display='block';
                loadData();
            }
        }

        async function loadData() {
            document.getElementById('status-msg').innerText = "Syncing...";
            try {
                const [hRes, sRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getHistory`),
                    fetch(`${SCRIPT_URL}?action=getStatus`)
                ]);
                allBookings = await hRes.json();
                statuses = await sRes.json();
                updateDots();
                renderTable();
                document.getElementById('status-msg').innerText = "Synced";
            } catch(e) { document.getElementById('status-msg').innerText = "Error Syncing"; }
        }

        function updateDots() {
            ['Super7', 'SCARA'].forEach(p => {
                const state = p === 'Super7' ? statuses.super7 : statuses.scara;
                document.getElementById(`dot-${p}`).className = 'status-dot ' + state.toLowerCase();
                const btn = document.getElementById(`btn-${p}`);
                btn.innerText = state === "Online" ? "Set Offline" : "Set Online";
                btn.style.backgroundColor = state === "Online" ? "#fee2e2" : "#d1fae5";
            });
        }

        async function toggleStatus(p) {
            const next = (p === 'Super7' ? statuses.super7 : statuses.scara) === "Online" ? "Offline" : "Online";
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'togglePrinter', printer: p, status: next }) });
            loadData();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const dateFilter = document.getElementById('dash-date').value;
            const violationMap = {};
            allBookings.forEach(b => { if (b.noshow === "Yes") violationMap[b.email] = (violationMap[b.email] || 0) + 1; });
            const filtered = dateFilter ? allBookings.filter(b => b.date === dateFilter) : allBookings;
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            tbody.innerHTML = filtered.map(row => {
                const missCount = violationMap[row.email] || 0;
                const isFlagged = missCount >= 3;
                const isNoShow = row.noshow === "Yes";
				// Clean up the date string in case Google sends an ISO timestamp
				const cleanDate = row.date && row.date.includes('T') ? row.date.split('T')[0] : row.date;
				const displayDate = row.date.split('T')[0];
				
				// Then use ${cleanDate} in your HTML instead of ${row.date}
                return `
                    <tr class="${isFlagged ? 'violation-row' : ''}">
                        <td style="font-weight:600;">${row.date}</td><td>${row.time}</td>
                        <td class="${isFlagged ? 'flag-text' : ''}">${row.name} ${isFlagged ? '⚠️ ('+missCount+')' : ''}</td>
                        <td style="font-size:0.75rem; color:#666;">${row.email}</td>
                        <td><span class="tag tag-${row.printer.toLowerCase()}">${row.printer}</span></td>
                        <td>
                            <div style="display:flex; gap:10px;">
                                <input type="text" class="notes-input" value="${row.notes || ''}" onblur="updateNote(${row.id}, this.value)" placeholder="Add note...">
                                <button onclick="markNoShow(${row.id}, ${!isNoShow})" 
                                    style="padding:5px 10px; border-radius:8px; cursor:pointer; font-size:0.7rem; font-weight:700; border:1px solid #ccc; background:${isNoShow ? '#ef4444; color:white;' : '#fff'};">
                                    ${isNoShow ? 'Missed' : 'Mark Miss'}
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateNote(id, val) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = "Saving...";
            
            try {
                // We send as a POST, and Google will handle the redirect
                await fetch(SCRIPT_URL, { 
                    method: 'POST',
                    mode: 'no-cors', // <--- ADD THIS if 'cors' keeps failing
                    body: JSON.stringify({ 
                        action: 'updateNote', 
                        id: id, 
                        notes: val 
                    }) 
                });
                
                // Note: with 'no-cors', we can't read the response JSON, 
                // but the data WILL hit the Google Sheet.
                statusMsg.innerText = "Saved"; 
                setTimeout(() => { statusMsg.innerText = "Synced"; }, 2000);
            } catch(e) {
                statusMsg.innerText = "Network Error";
                console.error(e);
            }
        }

        async function markNoShow(id, state) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = "Updating...";
            
            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: 'toggleNoShow', 
                        id: id, 
                        isNoShow: state 
                    }) 
                });
                const result = await response.json();
                if(result.status === "success") {
                    await loadData(); // Refresh table to show new color/count
                }
            } catch(e) {
                statusMsg.innerText = "Error";
                console.error(e);
            }
        }

        async function fetchAndReportCancelled() {
            document.getElementById('status-msg').innerText = "Fetching Archive...";
            const res = await fetch(`${SCRIPT_URL}?action=getArchive`);
            const archiveData = await res.json();
            if (archiveData.length === 0) { alert("No canceled records found."); return; }
            printReport("Canceled Appointments", archiveData);
            document.getElementById('status-msg').innerText = "Synced";
        }

        function generateReport(type) {
            const violationMap = {};
            allBookings.forEach(b => { if (b.noshow === "Yes") violationMap[b.email] = (violationMap[b.email] || 0) + 1; });
            let reportData = allBookings;
            let title = "Active Booking History";
            if (type === 'violations') {
                reportData = allBookings.filter(b => (violationMap[b.email] || 0) >= 3);
                title = "Violation Report (3+ Misses)";
            }
            printReport(title, reportData, violationMap);
        }

        function printReport(title, data, vMap = {}) {
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>${title}</title><style>body{font-family:sans-serif;padding:30px;}table{width:100%;border-collapse:collapse;}th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:12px;}th{background:#eee;}</style></head><body><h1>${title}</h1><p>Generated: ${new Date().toLocaleString()}</p><table><thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Printer</th><th>Time</th><th>Notes</th>${Object.keys(vMap).length ? '<th>Misses</th>' : ''}</tr></thead><tbody>${data.map(r=>`<tr><td>${r.date}</td><td>${r.name}</td><td>${r.email}</td><td>${r.printer}</td><td>${r.time}</td><td>${r.notes||''}</td>${Object.keys(vMap).length ? '<td>'+(vMap[r.email]||0)+'</td>' : ''}</tr>`).join('')}</tbody></table><script>window.print();<\/script></body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
