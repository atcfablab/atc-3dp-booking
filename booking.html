<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Printer | ATC FabLab</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; max-width: 600px; width: 100%; border-radius: 25px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); box-sizing: border-box; text-align: center; }
        .back-nav { text-align: left; margin-bottom: 20px; }
        .back-nav a { text-decoration: none; color: #888; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 30px; }
        .rules-card { background-color: #fffbeb; border: 2px solid #fcd34d; border-radius: 12px; padding: 25px; margin-bottom: 30px; text-align: left; }
        .rules-card h2 { margin-top: 0; font-size: 1.1rem; color: #92400e; font-weight: 800; }
        .rules-card ul { padding-left: 18px; margin: 0; color: #92400e; font-size: 0.85rem; line-height: 1.5; }
        .rules-card li { margin-bottom: 12px; }
        input[type="date"], .text-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e5e7eb; box-sizing: border-box; margin-bottom: 15px; font-size: 1rem; font-family: inherit; }
        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 10px; }
        .slot-label { font-size: 0.75rem; font-weight: 800; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
        .clear-all { font-size: 0.75rem; font-weight: 700; color: #374151; background: #f3f4f6; border: none; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
        .lockout-notice { color: #ef4444; font-size: 0.7rem; margin-top: -5px; margin-bottom: 15px; text-align: left; }
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .time-slot { position: relative; padding: 18px 5px; border: 1px solid #e5e7eb; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.8rem; text-align: center; transition: 0.1s; background: #fff; display: flex; align-items: center; justify-content: center; }
        .time-slot.selected { background: #000 !important; color: #fff !important; border-color: #000 !important; }
        .time-slot.locked { opacity: 0.3; pointer-events: none; background: #f9fafb; cursor: not-allowed; }
        .time-slot.reserved { background-color: #e2e8f0; color: #94a3b8; text-decoration: line-through; cursor: not-allowed; border: 1px solid #cbd5e1; pointer-events: none; }
        .clay-badge { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #f59e0b; color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; white-space: nowrap; z-index: 10; }
        .primary-btn { background: #000; color: white; border: none; width: 100%; padding: 18px; border-radius: 35px; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .secondary-btn { background: #fff; color: #888; border: 1px solid #e5e7eb; width: 100%; padding: 12px; border-radius: 35px; font-weight: 500; font-size: 0.85rem; cursor: pointer; margin-top: 15px; }
        .booking-item { border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; background: #fff; }
        .cancel-btn { background: #fee2e2; color: #b91c1c; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 0.75rem; cursor: pointer; }
        #form-container, #manage-view { display: none; }
        @media (max-width: 480px) { .time-grid { grid-template-columns: repeat(2, 1fr); } }
        .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
    </style>
</head>
<body>
    <div class="container">
        <div id="booking-view">
            <div class="back-nav"><a href="index.html">← Back to Selection</a></div>
            <h1 id="printer-title">Reserve Printer</h1>
            <div class="rules-card">
                <h2>Read Before Booking</h2>
                <ul id="rules-list"></ul>
            </div>
            <input type="date" id="date-picker">
            <div id="slot-container" style="display:none;">
                <div class="slot-header"><span class="slot-label">Available Slots</span><button class="clear-all" onclick="clearAll()">Clear All</button></div>
                <div class="lockout-notice">* Same-day bookings must be made at least 1 hour in advance.</div>
                <div id="time-grid" class="time-grid"></div>
            </div>
            <div id="form-container">
                <input type="text" id="user-name" class="text-input" placeholder="Full Name">
                <input type="email" id="user-email" class="text-input" placeholder="uark-email@uark.edu">
                <div id="scara-extra" style="display:none;"><input type="text" id="group-members" class="text-input" placeholder="Group Member Names (e.g. Adam, Eric, Steve)"></div>
                <button class="primary-btn" id="submit-btn" onclick="handleConfirm()">Complete Reservation</button>
            </div>
            <button class="secondary-btn" onclick="toggleView('manage')">Manage / Cancel Existing Booking</button>
        </div>

        <div id="manage-view">
            <div class="back-nav"><a onclick="toggleView('booking')">← Back to Booking</a></div>
            <h1>Your Bookings</h1>
            <input type="text" id="lookup-name" class="text-input" placeholder="Full Name">
            <input type="email" id="lookup-email" class="text-input" placeholder="uark-email@uark.edu">
            <button class="primary-btn" id="lookup-btn" onclick="lookupBookings()">Find My Bookings</button>
            <div id="results-container" style="margin-top: 30px; display: block;"><div id="results-list"></div></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbweWbXj7Ga2Ns-DcfAboS7mKFkNCGGS83I8qrnnioaUxWlOwZvqKzZQH_ybK88Mz849OQ/exec"; 
        const params = new URLSearchParams(window.location.search);
        const printer = params.get('printer') || "Super7";
        let selectedIndices = [];

        const super7Times = ["09:00 AM - 10:00 AM", "10:00 AM - 10:30 AM", "10:30 AM - 11:00 AM", "11:00 AM - 11:30 AM", "11:30 AM - 12:00 PM", "01:00 PM - 01:30 PM", "01:30 PM - 02:00 PM", "02:00 PM - 02:30 PM", "02:30 PM - 03:00 PM", "03:00 PM - 03:30 PM", "03:30 PM - 04:00 PM", "04:00 PM - 04:30 PM"];
        const scaraTimes = ["09:00 AM - 11:00 AM", "10:00 AM - 12:00 PM", "01:00 PM - 03:00 PM", "02:00 PM - 04:00 PM"];

        const rules = {
            "Super7": [
                "<strong>Clay Preparation is required every Monday from 9:00 - 10:00 AM.</strong> This task requires two individual students to sign up independently. Each student must book their own slot to help load clay for the week. If these two spots are not filled, the class will not have clay for printing. These two students will also automatically receive printing time from 10:00 - 10:30 AM on that day. They are welcome to book the following 30 minute slot from 10:30 - 11:00 AM if they would like a full hour of printing between the two. This can be coordinated as a group.",
                "<strong>Printing sessions are 30-minute increments.</strong>",
                "<strong>Students may book 30 or 60 minutes per session.</strong>",
                "<strong>One student max per printing time slot.</strong>",
                "<strong>Two students max per Clay Preparation slot.</strong>",
                "<strong>Lunch (12:00 - 1:00 PM) is not bookable.</strong>",
                "<strong>Sign up no later than one (1) hour before you plan to print.</strong>",
                "<strong>Use the Manage/Cancel Existing Booking button at the bottom of the page to cancel or look up your appointment(s).</strong> Cancellations must be made at least one (1) hour in advance of your booked starting time. Enter your name and email to find and cancel your booking. If cancellation falls within a shorter time frame, try to coordinate with your classmates on another group taking your scheduled spot.",
                "<strong>All work must end at 4:30 PM to allow staff to begin shutting down the space and shop.</strong> Assist in any cleaning necessary at the end of your printing session.",
                "<strong>If any other issues arise, contact atcfablab@gmail.com & we will help you as best we can.</strong>"
            ],
            "SCARA": [
                "<strong>All time slots include BOTH your mixing/loading & your printing time.</strong> All time slots are two (2) hours long.",
                "<strong>Tuesdays and Thursdays can be used for testing your mixes BEFORE booking an official time slot.</strong> These days do not have to be officially booked.",
                "<strong>There are NO consecutive sessions - you only get one session per day per group.</strong> This is to allow as many groups as possible to print in a day.",
                "<strong>When booking time, include your other group members' names.</strong>",
                "<strong>Lunch (12:00 - 1:00 PM) is not bookable.</strong>",
                "<strong>Sign up no later than one (1) hour before you plan to print.</strong>",
                "<strong>Use the Manage/Cancel Existing Booking button at the bottom of the page to cancel or look up your appointment(s).</strong> Cancellations must be made at least one (1) hour in advance of your booked starting time. Enter your name and email to find and cancel your booking. If cancellation falls within a shorter time frame, try to coordinate with your classmates on another group taking your scheduled spot.",
                "<strong>All work must end at 4:30 PM to allow staff to begin shutting down the space and shop.</strong> Assist in any cleaning necessary at the end of your printing session.",
                "<strong>If any other issues arise, contact atcfablab@gmail.com & we will help you as best we can.</strong>"
            ]
        };

        // Initialize Page
        document.getElementById('printer-title').innerText = "Reserve " + printer;
        rules[printer].forEach(text => {
            const li = document.createElement('li'); li.innerHTML = text;
            document.getElementById('rules-list').appendChild(li);
        });
        if (printer === "SCARA") document.getElementById('scara-extra').style.display = "block";

        const dateInput = document.getElementById('date-picker');
        dateInput.setAttribute('min', new Date().toISOString().split('T')[0]);
        dateInput.onchange = () => renderGrid();

        function isWithinLockout(dateStr, timeStr) {
            const nowInCentral = new Date(new Intl.DateTimeFormat('en-US', { timeZone: 'America/Chicago', hour12: false, year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric', second: 'numeric' }).format(new Date()));
            const startStr = timeStr.split(' - ')[0];
            const [time, modifier] = startStr.split(' ');
            let [hours, minutes] = time.split(':');
            hours = parseInt(hours);
            if (modifier === 'PM' && hours !== 12) hours += 12;
            if (modifier === 'AM' && hours === 12) hours = 0;
            const slotTime = new Date(`${dateStr}T${String(hours).padStart(2, '0')}:${minutes}:00`);
            return (slotTime - nowInCentral) < (60 * 60 * 1000);
        }

        async function renderGrid() {
            const grid = document.getElementById('time-grid');
            const selectedDate = dateInput.value; 
            if (!selectedDate) return;

            // --- STAFF OVERRIDES ---
            const specialOpenDates = ["2026-03-17"];  
            const specialClosedDates = ["2026-03-23", "2026-03-24", "2026-03-25", "2026-03-26", "2026-03-27"]; 

            const dateObj = new Date(selectedDate + 'T00:00:00');
            const day = dateObj.getDay(); 

            const isSpecialOpen = specialOpenDates.includes(selectedDate);
            const isSpecialClosed = specialClosedDates.includes(selectedDate);
            const isStandardDay = [1, 2, 3, 4, 5].includes(day);

            // 1. Check if we should STOP immediately
            if (isSpecialClosed) {
                grid.innerHTML = "<div style='grid-column: 1/-1; color:#ef4444; border:1px dashed #ef4444; padding:20px; border-radius:12px; font-weight:700;'>The Lab is closed today for a holiday or special event.</div>";
                document.getElementById('slot-container').style.display = "block";
                document.getElementById('form-container').style.display = "none";
                return;
            }

            // Update the error message below to reflect the new days
            if (!isStandardDay && !isSpecialOpen) {
                grid.innerHTML = "<div style='grid-column: 1/-1; color:#ef4444; border:1px dashed #ef4444; padding:20px; border-radius:12px; font-weight:700;'>The Lab is closed. Please select a weekday.</div>";
                document.getElementById('slot-container').style.display = "block";
                document.getElementById('form-container').style.display = "none";
                return;
            }

            // 2. If we passed those checks, NOW we show "Checking availability"
            grid.innerHTML = "Checking availability..."; 
            document.getElementById('slot-container').style.display = "block";
            document.getElementById('form-container').style.display = "none";
            selectedIndices = [];

            try {
                const [statusRes, historyRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getStatus`),
                    fetch(`${SCRIPT_URL}?action=getHistory`)
                ]);
                const statusData = await statusRes.json();
                const allBookings = await historyRes.json();

                const isOnline = (printer === "Super7") ? statusData.super7 === "Online" : statusData.scara === "Online";
                
                if (!isOnline) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; background: #fee2e2; color: #b91c1c; padding: 30px; border-radius: 15px; font-weight: 700;">⚠️ This printer is currently OFFLINE for maintenance.</div>`;
                    return;
                }

                grid.innerHTML = "";
                const times = (printer === "Super7") ? super7Times : scaraTimes;
                
                times.forEach((timeStr, i) => {
                    // Monday Super7 logic ONLY applies on actual Mondays (day 1)
                    if (printer === "Super7" && day === 1 && i === 1) return;
                    
                    const slot = document.createElement('div');
                    slot.className = 'time-slot'; 
                    slot.id = `slot-${i}`;

                    const bookingCount = allBookings.filter(b => 
                        b.printer === printer && b.date === selectedDate && b.time.includes(timeStr)
                    ).length;

                    // Clay prep logic ONLY applies on actual Mondays (day 1)
                    const isClayPrepSlot = (printer === "Super7" && day === 1 && i === 0);
                    const maxCapacity = isClayPrepSlot ? 2 : 1;
                    const isFull = bookingCount >= maxCapacity;

                    if (isFull) {
                        slot.classList.add('reserved');
                        slot.innerText = timeStr + " (Full)";
                    } else if (isWithinLockout(selectedDate, timeStr)) {
                        slot.classList.add('locked');
                        slot.innerText = timeStr;
                    } else {
                        slot.onclick = () => handleSelection(i, day);
                        if (isClayPrepSlot) {
                            const spotsLeft = 2 - bookingCount;
                            slot.innerHTML = `<span class="clay-badge">Clay Prep (${spotsLeft} left)</span>` + timeStr;
                        } else {
                            slot.innerText = timeStr;
                        }
                    }
                    grid.appendChild(slot);
                });
            } catch (e) { 
                console.error(e);
                grid.innerHTML = "Error loading slots."; 
            }
        }
        
        function handleSelection(idx, day) {
            if (printer === "SCARA") {
                selectedIndices = selectedIndices.includes(idx) ? [] : [idx];
            } else {
                const isMonday = (day === 1);
                if (isMonday && idx === 0) {
                    selectedIndices = selectedIndices.includes(0) ? [] : [0, 1];
                } else {
                    if (selectedIndices.includes(idx)) {
                        selectedIndices = selectedIndices.filter(i => i !== idx);
                        if (isMonday && selectedIndices.includes(0) && selectedIndices.length === 1) selectedIndices.push(1);
                    } else {
                        if (isMonday && selectedIndices.includes(0)) {
                            if (idx === 2) selectedIndices = [0, 1, 2];
                            else selectedIndices = [idx];
                        } else if (selectedIndices.length < 2 && (selectedIndices.length === 0 || Math.abs(selectedIndices[0] - idx) === 1)) {
                            selectedIndices.push(idx); selectedIndices.sort((a,b) => a - b);
                        } else selectedIndices = [idx];
                    }
                }
            }
            updateVisuals(day);
        }

        function updateVisuals(day) {
            const grid = document.getElementById('time-grid');
            const isMonday = (day === 1);
            const clayActive = selectedIndices.includes(0) && printer === "Super7" && isMonday;
            let autoSlot = document.getElementById('slot-1');
            if (isMonday && printer === "Super7") {
                if (clayActive && !autoSlot) {
                    autoSlot = document.createElement('div'); autoSlot.className = 'time-slot selected'; autoSlot.id = 'slot-1'; autoSlot.innerText = "10:00 AM - 10:30 AM";
                    grid.insertBefore(autoSlot, grid.children[1]);
                } else if (!clayActive && autoSlot) autoSlot.remove();
            }
            document.querySelectorAll('.time-slot').forEach(slot => {
                const id = parseInt(slot.id.replace('slot-', ''));
                slot.classList.toggle('selected', selectedIndices.includes(id));
            });
            document.getElementById('form-container').style.display = selectedIndices.length > 0 ? "block" : "none";
        }

        function clearAll() { selectedIndices = []; updateVisuals(); document.getElementById('form-container').style.display = "none"; }

        function toggleView(view) {
            document.getElementById('booking-view').style.display = (view === 'booking') ? 'block' : 'none';
            document.getElementById('manage-view').style.display = (view === 'manage') ? 'block' : 'none';
        }

        async function handleConfirm() {
    // 1. Get current values
    const name = document.getElementById('user-name').value.trim();
    const email = document.getElementById('user-email').value.trim();
    const group = document.getElementById('group-members').value.trim(); 
    const btn = document.getElementById('submit-btn'); 

    // 2. Validation Checks
    if (!name || !email) return alert("Please fill in your details.");
    
    // SCARA specific rule: Must have group members
    if (printer === "SCARA" && !group) {
        return alert("⚠️ SCARA Requirement: You must list all group members (e.g. Adam, Eric, Steve) to book this machine.");
    }
    
    // 3. UI Feedback (Lock button and show spinner)
    btn.disabled = true; 
    btn.style.opacity = "0.7";
    btn.style.cursor = "not-allowed";
    btn.innerHTML = `<span class="spinner"></span> Verifying Group Names...`;

    const payload = { 
        action: 'book', 
        name, 
        email, 
        printer, 
        date: document.getElementById('date-picker').value, 
        time: selectedIndices.map(i => (printer === "Super7" ? super7Times : scaraTimes)[i]).join(', '), 
        group: group
    };

    try {
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json(); 

        if (result.status === "success") {
            alert("Reservation Confirmed!");
            window.location.href = "index.html"; // Redirect back to home
        } else {
            // This catches the "One booking per group" error from the server
            alert("⚠️ BOOKING STOPPED: " + result.message);
            
            // Reset button so they can fix the names and try again
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            btn.innerText = "Complete Reservation";
            renderGrid(); // Refresh to show if someone else grabbed the slot
        }
    } catch (e) { 
        console.error("Fetch Error:", e);
        alert("Success! (Wait, if your sheet didn't update, please refresh and try again)."); 
        btn.disabled = false;
        btn.innerText = "Complete Reservation";
    }
}

        async function lookupBookings() {
            const n = document.getElementById('lookup-name').value.trim();
            const e = document.getElementById('lookup-email').value.trim().toLowerCase();
            const list = document.getElementById('results-list');
            if (!n || !e) return alert("Enter both name and email.");
            
            list.innerHTML = "<strong>Searching...</strong>";
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getHistory`);
                const all = await res.json();
                const filtered = all.filter(b => 
                    (b.email && b.email.toLowerCase() === e) || 
                    (b.name && b.name.toLowerCase().includes(n.toLowerCase()))
                );
                
                if (filtered.length === 0) {
                    list.innerHTML = "<div style='color:red;'>No active bookings found.</div>";
                    return;
                }
                
                list.innerHTML = filtered.map(b => {
                    const locked = isWithinLockout(b.date, b.time.split(' - ')[0]);
                    return `<div class="booking-item">
                        <div>
                            <strong>${b.printer}</strong><br>
                            ${b.date} @ ${b.time}
                        </div>
                        <div>
                            ${locked ? '<span style="color:gray; font-size:0.7rem;">LOCKED</span>' : 
                            `<button class="cancel-btn" onclick="cancelBooking('${b.id}','${b.date}','${b.name.replace(/'/g, "\\'")}','${b.printer}','${b.time}')">Cancel</button>`}
                        </div>
                    </div>`;
                }).join('');
            } catch (err) {
                list.innerHTML = "Error connecting to server.";
            }
        }

        async function cancelBooking(id, date, name, printer, time) {
            if (!confirm("Are you sure you want to cancel this reservation?")) return;
            document.getElementById('results-list').innerHTML = "Cancelling...";
            try {
                const payload = { action: 'cancel', id, date, name, printer, time };
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Reservation cancelled successfully.");
                lookupBookings();
            } catch (e) {
                alert("Error cancelling booking.");
                lookupBookings();
            }
        }
    </script>
</body>
</html>
